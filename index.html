<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Earth Loadout Terminal</title>
    <link rel="preload" href="gear_data.json" as="fetch" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="scanlines"></div>
    <div class="terminal-container">
        <header>
            <img src="./all-icons/HD_Logo_Header.svg" class="header-logo" alt="Helldivers Logo">
            <div class="title-wrapper">
                <img src="./all-icons/Super_Earth.svg" class="title-icon" alt="Super Earth Icon">
                <h1>Super Earth Loadout Generator</h1>
            </div>
            <p class="subtitle">Awaiting Hellpod Configuration...</p>
        </header>

        <div class="controls">
            <div id="special-orders-toggle-container">
                <input type="checkbox" id="special-orders-toggle">
                <label for="special-orders-toggle">Special Orders</label>
            </div>
            <button id="generate-btn" class="primary-btn">INITIALIZE DROP</button>
            <button id="reset-btn" class="secondary-btn">RESET ARMORY</button>
        </div>

        <div id="special-order-banner" class="challenge-banner" style="display: none;"></div>

        <div id="loadout-display">
            <div class="loadout-row" id="top-row"></div>
            <div class="loadout-row" id="bottom-row"></div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
