<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="64" height="64">
  <!-- Solid Black Background Badge -->
  <rect width="100" height="100" rx="16" fill="#000000" />
  
  <!-- Minimalist Space Background Dust -->
  <circle cx="85" cy="25" r="1.5" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="20" cy="20" r="1.5" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="75" cy="80" r="1" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="25" cy="75" r="1" fill="#FFFFFF" opacity="0.3"/>

  <!-- Thruster Flare -->
  <path d="M 15 46 L 2 50 L 15 54 Z" fill="#FFE800" />
  <path d="M 15 48 L 5 50 L 15 52 Z" fill="#FFFFFF" />

  <!-- Engine Block -->
  <rect x="13" y="44" width="6" height="12" fill="#333333" />

  <!-- Main Hull -->
  <path d="M 19 43 L 75 43 L 88 50 L 75 57 L 19 57 Z" fill="#CCCCCC" />

  <!-- Upper Bridge -->
  <path d="M 30 43 L 36 33 L 56 33 L 64 43 Z" fill="#999999" />
  
  <!-- Command Deck Window Glow -->
  <rect x="38" y="36" width="4" height="7" fill="#FFE800" /> 

  <!-- Lower Hangars / Hellpod Bays -->
  <path d="M 30 57 L 36 67 L 66 67 L 72 57 Z" fill="#666666" />
  
  <!-- Hellpod Bay details (Drop bays) -->
  <rect x="42" y="57" width="2" height="10" fill="#333333" />
  <rect x="50" y="57" width="2" height="10" fill="#333333" />
  <rect x="58" y="57" width="2" height="10" fill="#333333" />

  <!-- Front Cannon / Sensor Array -->
  <rect x="75" y="57" width="2" height="4" fill="#666666" />
  <rect x="76" y="59" width="10" height="2" fill="#999999" />

  <!-- Helldivers Yellow Accent Stripe across the hull -->
  <rect x="30" y="48.5" width="45" height="3" fill="#FFE800" />
</svg>
